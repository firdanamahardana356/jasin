name: Cerebrium Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      CEREBRIUM_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CEREBRIUM_SERVICE_ACCOUNT_TOKEN }}
      CEREBRIUM_PROJECT_ID: ${{ secrets.CEREBRIUM_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Install CLI
        run: pip install cerebrium

      - name: Debug (cek isi)
        run: echo "PROJECT=$CEREBRIUM_PROJECT_ID"

      - name: Set project
        run: cerebrium project set $CEREBRIUM_PROJECT_ID

      - name: Deploy
        run: cerebrium deploy
