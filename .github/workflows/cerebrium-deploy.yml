name: Build & Deploy to Cerebrium GPU

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      CEREBRIUM_PROJECT_ID: ${{ secrets.CEREBRIUM_PROJECT_ID }}
      CEREBRIUM_SERVICE_ACCOUNT_TOKEN: ${{ secrets.CEREBRIUM_SERVICE_ACCOUNT_TOKEN }}

    steps:
      # 1. Clone repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install cerebrium
          pip install -r requirements.txt

      # 4. Set project
      - name: Set Cerebrium Project
        run: cerebrium project set $CEREBRIUM_PROJECT_ID

      # 5. Validate (optional tapi bagus)
      - name: Validate App
        run: cerebrium validate

      # 6. Deploy ke GPU
      - name: Deploy App
        run: cerebrium deploy

      # 7. Done
      - name: Success
        run: echo "Deploy berhasil ke GPU 🚀"
