[cerebrium.deployment]
name = "llm-inference"
python_version = "3.12"
disable_auth = false

[cerebrium.hardware]
cpu = 4
memory = 16.0
compute = "AMPERE_A10"
gpu_count = 1
provider = "aws"
region = "us-east-1"

[cerebrium.scaling]
min_replicas = 0
max_replicas = 2
replica_concurrency = 10
response_grace_period = 3600
cooldown = 1800
scaling_metric = "concurrency_utilization"
scaling_target = 100
evaluation_interval_seconds = 30
# load_balancing_algorithm = ""  # Auto-selects based on replica_concurrency
# compute_tier = "interruptible"  # Use "protected" for on-demand instances
roll_out_duration_seconds = 0

[cerebrium.dependencies.pip]
torch = "latest"
transformers = "latest"

[cerebrium.dependencies.conda]
# Optional conda dependencies

